# push 到 main → 跑測試 → 測試全過才部署 Cloud Run
# GitHub ↔ GCP 認證走 Workload Identity Federation(OIDC),全程零金鑰
name: CI / Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 後端:建資料庫 → pytest
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt pytest
      - run: python db/init_db.py && python db/seed.py
      - run: pytest

      # 前端:型別檢查(含 build 驗證可以留給部署階段的 Docker)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: frontend
      - run: npm run type-check
        working-directory: frontend

  deploy:
    needs: test # 測試不過就不部署——CI/CD 的「CI」
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # 允許 GitHub 簽發 OIDC token 給 GCP 換身分
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/56007855094/locations/global/workloadIdentityPools/github/providers/github
          service_account: github-deployer@order-agent-502014.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud run deploy order-agent --source . --region asia-east1 --quiet
